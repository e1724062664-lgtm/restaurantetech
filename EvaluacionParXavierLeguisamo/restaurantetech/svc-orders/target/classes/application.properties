# ─── Aplicación ────────────────────────────────────────────────────────────────
spring.application.name=svc-orders
server.port=8082

# ─── DataSource PostgreSQL ──────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5434}/${DB_NAME:db_orders}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ────────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ─── URL de svc-menu (sobreescrita por variable de entorno Docker) ──────────────
menu.service.url=${MENU_SERVICE_URL:http://localhost:8081}

# ─── Logging ────────────────────────────────────────────────────────────────────
logging.level.com.restaurantetech=INFO
logging.level.org.hibernate.SQL=DEBUG
